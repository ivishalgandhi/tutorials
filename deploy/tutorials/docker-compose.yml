# Routing is done by Tailscale Funnel, not Traefik.
# Funnel strips the /tutorials prefix and proxies to localhost:80,
# so the container must publish port 80 on the host.
services:
  tutorials:
    build: ../../
    container_name: tutorials
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - dokploy-network

  audio-http:
    image: nginx:alpine
    container_name: audio-http
    restart: unless-stopped
    ports:
      - "8082:80"
    networks:
      - dokploy-network
    volumes:
      - /mnt/nas/code_artifacts:/usr/share/nginx/html:ro
      - ./nginx-audio.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  dokploy-network:
    external: true
