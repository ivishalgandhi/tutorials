# pg_hba.conf — SOLUTION: Production pg_hba.conf
#
# ORDERING RATIONALE (most specific → broadest → catch-all):
#
#   1. Local socket — postgres superuser via peer (OS identity check, no password)
#   2. ci_migrate — single exact IP /32 BEFORE the broader app_user /24 subnet
#      (if app_user's /24 covered ci_migrate's IP, a /24 rule higher up would
#       swallow ci_migrate — the first-match trap from Exercise 01)
#   3. app_user — /24 subnet (broader than ci_migrate, must come after)
#   4. readonly_user — /24 subnet for analytics servers
#   5. dba_admin — single /32 IP (specific — but put after the /24 blocks because
#      10.0.4.10 doesn't overlap any earlier subnet — ordering still matters as
#      a habit even when there's no current overlap)
#   6. Catch-all reject — MUST be last
#
# WHY NO NETWORK ENTRY FOR postgres:
#   The superuser must never be reachable over the network. Any network breach
#   that obtains postgres credentials then has unrestricted access to everything.
#   Restrict superuser to local Unix socket only. For remote DBA work, connect
#   as dba_admin (a non-superuser with specific granted privileges) or use SSH
#   tunnelling to reach the local socket.
#
# WHY hostssl AND NOT host:
#   host allows unencrypted TCP. An attacker on the same network segment can
#   sniff scram-sha-256 challenge-response handshakes (they can't crack the
#   password, but they can see which roles exist and attempt replay in some
#   configurations). hostssl enforces TLS — all traffic is encrypted in transit.
#
# TYPE    DATABASE    USER          ADDRESS           METHOD
#
local     all         postgres                        peer
hostssl   myapp       ci_migrate    10.0.2.50/32      scram-sha-256
hostssl   myapp       app_user      10.0.1.0/24       scram-sha-256
hostssl   myapp       readonly_user 10.0.3.0/24       scram-sha-256
hostssl   all         dba_admin     10.0.4.10/32      scram-sha-256
host      all         all           0.0.0.0/0         reject
