# pg_hba.conf — SOLUTION: Auth Method Selection
#
# PROBLEM 1 — local postgres: trust → peer
#   trust on local means ANY OS user who can reach the Unix socket connects as
#   postgres with no password. peer is the correct method: it asks the OS which
#   user owns the process and only accepts it if the OS username matches the
#   PostgreSQL role name. Safe and password-free for the postgres OS user.
#
# PROBLEM 2 — app_user: md5 → scram-sha-256
#   md5 is deprecated since PostgreSQL 14. It uses an unsalted MD5 hash that is
#   vulnerable to offline dictionary attacks if the pg_authid hash is leaked.
#   scram-sha-256 uses a salted challenge-response — the password is never sent
#   over the wire and the stored hash cannot be replayed.
#   SQL Server equivalent: SQL Auth with older hashing vs. Windows Auth strength.
#
# PROBLEM 3 — dba_admin: trust → scram-sha-256
#   trust on a host connection means no password required for anyone connecting
#   from 10.0.2.5. If that workstation is ever compromised, an attacker has
#   full DBA access to every database with no credentials. Never use trust on
#   network (host/hostssl) connections.
#
# PROBLEM 4 — readonly_user: host → hostssl
#   host allows connections regardless of whether TLS is negotiated. hostssl
#   REQUIRES TLS — the connection is rejected if the client doesn't use SSL.
#   Analytics servers often use BI tools that default to unencrypted connections.
#   Forcing hostssl ensures credentials and query results travel encrypted.
#
# PROBLEM 5 — catch-all: scram-sha-256 → reject
#   A catch-all that prompts for a password is a security liability: it invites
#   brute-force login attempts against any role from any IP. The catch-all should
#   always be reject — deny silently, log nothing, give attackers no foothold.
#
# TYPE    DATABASE    USER          ADDRESS           METHOD
#
local     all         postgres                        peer
hostssl   appdb       app_user      10.0.1.10/32      scram-sha-256
hostssl   all         dba_admin     10.0.2.5/32       scram-sha-256
hostssl   all         readonly_user 10.0.3.0/24       scram-sha-256
host      all         all           0.0.0.0/0         reject
