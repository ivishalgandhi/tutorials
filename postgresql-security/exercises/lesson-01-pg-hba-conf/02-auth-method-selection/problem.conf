# pg_hba.conf — PROBLEM: Auth Method Selection
#
# A SQL Server DBA set up this file "to get things working".
# There are FIVE security problems — one per numbered line below.
# The comment on each line states the intent. Fix the method to match.
#
# TYPE    DATABASE    USER          ADDRESS           METHOD
#
# 1. Local postgres superuser — only the OS postgres user should connect
local     all         postgres                        trust

# 2. App service account from app server — password required over TLS
hostssl   appdb       app_user      10.0.1.10/32      md5

# 3. DBA admin account from DBA workstation — password required over TLS
hostssl   all         dba_admin     10.0.2.5/32       trust

# 4. Readonly reporting user from analytics server — password required over TLS
host      all         readonly_user 10.0.3.0/24       scram-sha-256

# 5. Catch-all — deny everything not matched above
host      all         all           0.0.0.0/0         scram-sha-256
