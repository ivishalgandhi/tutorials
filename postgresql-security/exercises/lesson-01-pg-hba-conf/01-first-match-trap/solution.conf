# pg_hba.conf — SOLUTION: First-Match Trap
#
# THE BUG:
#   Line 2 (host all all 10.0.0.0/8 trust) matches audit_user connecting from
#   10.0.5.20 BEFORE line 4 is ever reached. PostgreSQL evaluates rules top to
#   bottom and stops at the FIRST match. A broad rule above a specific rule
#   makes the specific rule unreachable — it is silently dead code.
#
# This is fundamentally different from SQL Server, where you add rules to a login
# object and they always apply. In pg_hba.conf, ORDER IS POLICY.
#
# THE FIX:
#   Move the specific audit_user rule ABOVE the broad 10.0.0.0/8 rule.
#   Also: replace trust with scram-sha-256 for the internal network.
#   trust means "no password required" — never appropriate for network connections.
#
# RULE OF THUMB:
#   Specific rules (named user, named IP) must come BEFORE broad rules (all users, wide CIDR).
#
# TYPE    DATABASE    USER          ADDRESS           METHOD
#
local     all         postgres                        peer
hostssl   all         audit_user    10.0.5.20/32      scram-sha-256
hostssl   all         all           10.0.0.0/8        scram-sha-256
hostssl   all         all           127.0.0.1/32      scram-sha-256
host      all         all           0.0.0.0/0         reject
#
# ADDITIONAL FIX: changed 'host' to 'hostssl' — host allows unencrypted
# connections. Use hostssl to require TLS for all network connections.
