# pg_hba.conf — PROBLEM: First-Match Trap
#
# Scenario: A DBA added line 4 to restrict audit_user to a specific IP.
# But audit_user can still connect from any IP without a password.
# The DBA is confused — "I added the rule, why isn't it working?"
#
# TYPE    DATABASE    USER          ADDRESS           METHOD
#
local     all         postgres                        peer
host      all         all           10.0.0.0/8        trust
host      all         all           127.0.0.1/32      scram-sha-256
host      all         audit_user    10.0.5.20/32      scram-sha-256
host      all         all           0.0.0.0/0         reject
